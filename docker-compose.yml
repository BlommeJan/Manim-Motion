name: manim_motion

services:
  # Init service to create directories with correct permissions
  init:
    image: alpine:3.19
    volumes:
      - manim_motion_data:/data
    command: >
      sh -c "mkdir -p /data/projects /data/assets /data/renders && 
             chmod -R 777 /data && 
             echo 'Data directories initialized'"
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build: ./services/api
    environment:
      - NODE_ENV=development
      - DATA_DIR=/data
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    volumes:
      - manim_motion_data:/data
    ports:
      - "3000:3000"
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  renderer:
    build: ./services/renderer
    environment:
      - DATA_DIR=/data
      - REDIS_URL=redis://redis:6379
    volumes:
      - manim_motion_data:/data
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  web:
    build: ./services/web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  manim_motion_data:
  redis_data:
