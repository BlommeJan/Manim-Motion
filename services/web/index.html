<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manim Studio</title>
  <link rel="icon" type="image/svg+xml" href="/assets/ManimMotionLogoNoTextNoBG.svg">
  <link rel="apple-touch-icon" href="/assets/ManimMotionLogoNoTextNoBG.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Apply saved theme before first paint to avoid flash
    (function() {
      var t = 'light';
      try { t = localStorage.getItem('manim-motion-theme') || 'light'; } catch(e) {}
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
